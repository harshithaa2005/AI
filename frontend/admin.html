<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <style>
/* ================================
   🌈 GLOBAL
================================ */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins", sans-serif;
}

body {
  min-height: 100vh;
  background: radial-gradient(circle at top left, #1b1f3b, #0a0c1b);
  color: #ffffff;
  overflow-x: hidden;
}

/* ================================
   🌌 BACKGROUND ORBS
================================ */
body::before,
body::after {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  background: linear-gradient(135deg, #7f5cff, #00e5ff);
  filter: blur(120px);
  opacity: 0.4;
  z-index: -1;
}

body::before {
  top: -100px;
  left: -100px;
}

body::after {
  bottom: -120px;
  right: -120px;
}

/* ================================
   🧭 NAVBAR
================================ */
.navbar {
  width: 100%;
  padding: 18px 40px;
  text-align: center;
  backdrop-filter: blur(16px);
  background: rgba(255, 255, 255, 0.06);
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.navbar h1 {
  font-size: 1.5rem;
  letter-spacing: 1px;
}

/* ================================
   📦 CONTAINER
================================ */
.container {
  padding: 40px;
  max-width: 900px;
  margin: auto;
}

/* ================================
   💎 CARD
================================ */
.card {
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 18px;
  padding: 25px;
  margin-bottom: 25px;
  box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
  animation: fadeInUp 0.6s ease;
}

/* ================================
   📊 STATS TEXT
================================ */
.card p {
  font-size: 1.1rem;
  margin: 10px 0;
}

.card span {
  font-weight: 600;
  color: #00e5ff;
}

/* ================================
   🔥 TOP TERMS
================================ */
h3 {
  margin-bottom: 15px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
  padding-bottom: 5px;
}

ul {
  list-style: none;
}

li {
  background: rgba(255,255,255,0.1);
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
  transition: 0.3s;
}

li:hover {
  background: rgba(255,255,255,0.2);
  transform: translateX(5px);
}

/* ================================
   🔘 BUTTON
================================ */
.logout {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  color: #ffffff;
  background: linear-gradient(135deg, #7f5cff, #00e5ff);
  transition: all 0.25s ease;
}

.logout:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(0, 229, 255, 0.4);
}

/* ================================
   ✨ ANIMATION
================================ */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(25px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ================================
   📱 MOBILE
================================ */
@media (max-width: 600px) {
  .container {
    padding: 20px;
  }
}
    </style>

</head>
<body>

<div class="navbar">
    <h1>⚡ Admin Dashboard</h1>
</div>

<div class="container">

    <div class="card">
        <p>Total Users: <span id="users"></span></p>
        <p>Total Prompts: <span id="prompts"></span></p>
    </div>

    <div class="card">
        <h3>🔥 Top Terms</h3>
        <ul id="terms"></ul>
    </div>

    <button class="logout" onclick="logout()">Logout</button>

</div>

<script>
fetch("/api/admin/stats")
.then(res => res.json())
.then(data => {

    if (data.error) {
        alert("Unauthorized");
        window.location.href = "/signin";
        return;
    }

    document.getElementById("users").innerText = data.total_users;
    document.getElementById("prompts").innerText = data.total_prompts;

    let list = document.getElementById("terms");
    data.top_terms.forEach(t => {
        let li = document.createElement("li");
        li.textContent = t.term + " (" + t.count + ")";
        list.appendChild(li);
    });
});

function logout() {
    fetch("/api/logout", { method: "POST" })
    .then(() => window.location.href = "/signin");
}
</script>

</body>
</html>
